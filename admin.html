<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="variables.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <span class="nav-title">Admin Panel</span>
    <button id="logout-btn" class="btn btn-secondary">Log Out</button>
  </nav>

  <main class="container">
    <div class="admin-stats">
      <div class="stat-card"><span id="stat-in">0</span><div>In</div></div>
      <div class="stat-card"><span id="stat-out">0</span><div>Out</div></div>
      <div class="stat-card"><span id="stat-total">0</span><div>Total</div></div>
    </div>

    <div class="table-header">
      <h2>All Staff Attendance</h2>
      <button id="export-btn" class="btn btn-primary">Export CSV</button>
    </div>

    <table id="admin-table">
      <thead>
        <tr><th>Name</th><th>Department</th><th>Status</th><th>Clock In</th><th>Clock Out</th></tr>
      </thead>
      <tbody id="admin-body"></tbody>
    </table>
  </main>

  <script src="utilityFunc.js"></script>
</body>
</html>
